<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Staff dashboard — ParcelTrack UK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* ==========================================================================
   ParcelTrack UK — design tokens
   Inspired by British split-flap departure boards and shipping manifests.
   ========================================================================== */
:root {
  --paper: #FAFAF7;
  --paper-dim: #F1EFE7;
  --ink: #1B2430;
  --ink-soft: #5B6470;
  --line: #DCD8CC;
  --accent: #E8A33C;
  --board-bg: #14181F;
  --board-fg: #F2C878;
  --route: #3E6259;

  --status-created: #5B6470;
  --status-dispatched: #3F5B73;
  --status-in_transit: #C98A2B;
  --status-out_for_delivery: #C15B2C;
  --status-delivered: #2F7A4D;
  --status-exception: #B5452F;

  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;

  --radius: 4px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 720px; margin: 0 auto; padding: 0 24px; }
.staff-body .container { max-width: 960px; }

h1, h2 { font-family: var(--font-display); color: var(--ink); margin: 0 0 8px; }
h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.01em; }
h2 {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  margin-top: 40px;
  font-weight: 600;
}

a { color: var(--ink); }
p { color: var(--ink-soft); }

:focus-visible { outline: 2px solid var(--route); outline-offset: 2px; }
.hidden { display: none !important; }

/* ---------- Header / footer ---------- */
.site-header { border-bottom: 1px solid var(--line); padding: 20px 0; }
.header-inner { display: flex; align-items: center; justify-content: space-between; }
.brand {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: -0.01em;
}
.brand span { color: var(--accent); }
.staff-link { font-size: 0.9rem; color: var(--ink-soft); text-decoration: none; border-bottom: 1px dashed var(--ink-soft); }
.staff-link:hover { color: var(--ink); }

.header-right { display: flex; align-items: center; gap: 16px; }
.staff-email { font-family: var(--font-mono); font-size: 0.85rem; color: var(--ink-soft); }

.site-footer { margin-top: 64px; border-top: 1px solid var(--line); padding: 20px 0 40px; }
.site-footer p { font-size: 0.8rem; color: var(--ink-soft); margin: 0; }

/* ---------- Hero / search ---------- */
.hero { padding: 48px 0 24px; }
.eyebrow {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-soft);
  margin-bottom: 10px;
}
.hero p.lede { font-size: 1.05rem; margin: 0 0 24px; }

.track-form { display: flex; gap: 10px; border-bottom: 2px solid var(--ink); padding-bottom: 4px; }
.track-form input {
  flex: 1;
  border: none;
  background: transparent;
  font-family: var(--font-mono);
  font-size: 1.25rem;
  letter-spacing: 0.04em;
  color: var(--ink);
  padding: 10px 4px;
  min-width: 0;
}
.track-form input::placeholder { color: var(--line); }
.track-form input:focus { outline: none; }

.route-divider { border: none; border-top: 2px dashed var(--line); margin: 32px 0; }

/* ---------- Buttons ---------- */
button { font-family: var(--font-body); cursor: pointer; }

.btn-primary {
  background: var(--accent);
  color: var(--ink);
  border: none;
  border-radius: var(--radius);
  padding: 12px 22px;
  font-weight: 600;
  font-size: 0.95rem;
  white-space: nowrap;
}
.btn-primary:hover { background: #d9922f; }

.btn-secondary {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--ink);
  border-radius: var(--radius);
  padding: 10px 18px;
  font-weight: 500;
  font-size: 0.9rem;
}
.btn-secondary:hover { background: var(--paper-dim); }

/* ---------- State messages ---------- */
.state-message { padding: 20px 0; color: var(--ink-soft); font-size: 0.95rem; }
.state-error { color: var(--status-exception); }

/* ---------- Status board (signature element) ---------- */
.status-board { display: inline-flex; flex-wrap: wrap; gap: 3px; background: var(--board-bg); padding: 14px 16px; border-radius: var(--radius); }
.flap {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: var(--board-fg);
  min-width: 0.7em;
  text-align: center;
  transform-origin: 50% 55%;
}
.flap.flip { animation: flap-turn 0.45s ease; }
@keyframes flap-turn {
  0%   { transform: rotateX(0deg); opacity: 1; }
  45%  { transform: rotateX(90deg); opacity: 0.5; }
  55%  { transform: rotateX(90deg); opacity: 0.5; }
  100% { transform: rotateX(0deg); opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  .flap.flip { animation: none; }
}

.status-row { display: flex; flex-wrap: wrap; align-items: center; gap: 20px; margin-bottom: 8px; }
.route { font-family: var(--font-mono); font-size: 1rem; color: var(--ink); }
.route-arrow { color: var(--ink-soft); margin: 0 8px; }
.eta { font-size: 0.9rem; margin-top: 4px; }

/* ---------- Status pill (compact, tables/lists) ---------- */
.status-pill {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #fff;
  padding: 4px 9px;
  border-radius: var(--radius);
  white-space: nowrap;
}

/* ---------- Map ---------- */
#map, .pin-map {
  height: 380px;
  width: 100%;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  margin: 24px 0;
  background: var(--paper-dim);
}
.pin-map { height: 260px; }

/* ---------- Timeline (ledger) ---------- */
.timeline { list-style: none; padding: 0; margin: 16px 0 0; }
.timeline-item { display: flex; gap: 14px; padding: 14px 0; border-top: 1px solid var(--line); }
.timeline-item:last-child { border-bottom: 1px solid var(--line); }
.timeline-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.timeline-content { flex: 1; min-width: 0; }
.timeline-status { font-weight: 600; }
.timeline-location { color: var(--ink-soft); font-size: 0.92rem; }
.timeline-time { font-family: var(--font-mono); font-size: 0.8rem; color: var(--ink-soft); margin-top: 4px; }

/* ---------- Forms (staff) ---------- */
.card-form { display: flex; flex-direction: column; gap: 16px; max-width: 480px; margin-top: 20px; }
.card-form label { display: flex; flex-direction: column; gap: 6px; font-size: 0.85rem; color: var(--ink-soft); }
.card-form input, .card-form select {
  font-family: var(--font-body);
  font-size: 1rem;
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 10px 12px;
  background: #fff;
}
.card-form input:focus, .card-form select:focus { border-color: var(--ink); outline: none; }
.geocode-row { display: flex; gap: 8px; }
.geocode-row input { flex: 1; }
.coord-row { display: flex; gap: 16px; flex-wrap: wrap; }
.coord-row label { flex: 1; min-width: 100px; }
.checkbox-row { flex-direction: row !important; align-items: center; gap: 8px !important; }
.checkbox-row input[type="checkbox"] { width: auto; }
.form-error { color: var(--status-exception); font-size: 0.85rem; margin: 0; }

/* ---------- Full shipment details (collapsible ledger) ---------- */
.detail-full-info { margin-top: 24px; border: 1px solid var(--line); border-radius: var(--radius); padding: 4px 16px; }
.detail-full-info summary {
  cursor: pointer;
  padding: 12px 0;
  font-weight: 600;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
}
.info-grid { padding: 4px 0 16px; }
.info-section-title {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent);
  margin: 18px 0 6px;
}
.info-section-title:first-child { margin-top: 0; }
.info-row { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--paper-dim); font-size: 0.9rem; }
.info-label { color: var(--ink-soft); flex-shrink: 0; }
.info-value { color: var(--ink); text-align: right; }

/* ---------- Auth card ---------- */
.auth-card { max-width: 360px; margin: 80px auto; padding: 0 24px; text-align: left; }
.auth-card h1 { margin-top: 24px; font-size: 1.4rem; text-transform: none; letter-spacing: -0.01em; }
.auth-card form { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; }
.auth-card label { display: flex; flex-direction: column; gap: 6px; font-size: 0.85rem; color: var(--ink-soft); }
.auth-card input { font-family: var(--font-body); font-size: 1rem; border: 1px solid var(--line); border-radius: var(--radius); padding: 10px 12px; }
.auth-card button { margin-top: 4px; }

/* ---------- Staff dashboard ---------- */
.view-header { display: flex; align-items: center; justify-content: space-between; margin-top: 40px; margin-bottom: 8px; flex-wrap: wrap; gap: 12px; }
.view-header h1 { margin: 0; text-transform: none; letter-spacing: -0.01em; }

.parcel-table-wrap { overflow-x: auto; }
.parcel-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.92rem; }
.parcel-table th {
  text-align: left;
  font-family: var(--font-mono);
  text-transform: uppercase;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
  border-bottom: 2px solid var(--ink);
  padding: 10px 8px;
  white-space: nowrap;
}
.parcel-table td { padding: 12px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }

.detail-summary { margin-top: 20px; }

/* ---------- Responsive ---------- */
@media (max-width: 600px) {
  .container { padding: 0 16px; }
  h1 { font-size: 1.6rem; }
  .track-form { flex-direction: column; align-items: stretch; }
  .track-form input { font-size: 1.1rem; }
  .flap { font-size: 1.1rem; }
  .status-board { padding: 10px 12px; }
  #map, .pin-map { height: 280px; }
  .coord-row { flex-direction: column; gap: 12px; }
  .view-header { flex-direction: column; align-items: flex-start; }
}

</style>
</head>
<body class="staff-body">
<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="brand">Parcel<span>Track</span> UK</a>
    <div class="header-right">
      <span id="staff-email" class="staff-email"></span>
      <button id="sign-out" class="btn-secondary">Sign out</button>
    </div>
  </div>
</header>

<main class="container">

  <section id="view-list">
    <div class="view-header">
      <h1>Parcels</h1>
      <button id="new-parcel-btn" class="btn-primary">+ New parcel</button>
    </div>
    <div class="parcel-table-wrap">
      <table class="parcel-table">
        <thead>
          <tr><th>Tracking #</th><th>Recipient</th><th>Destination</th><th>Status</th><th>Updated</th><th></th></tr>
        </thead>
        <tbody id="parcel-table-body"></tbody>
      </table>
    </div>
    <p id="list-empty" class="state-message hidden">No parcels yet. Create the first one to start tracking.</p>
  </section>

  <section id="view-new" class="hidden">
    <div class="view-header">
      <h1>New parcel</h1>
      <button class="btn-secondary back-btn" data-back="view-list">← Back to list</button>
    </div>
    <form id="new-parcel-form" class="card-form">
      <h2>Sender information</h2>
      <label>Full name <input type="text" id="np-sender-name" required /></label>
      <label>Phone number <input type="tel" id="np-sender-phone" required /></label>
      <label>Email (optional) <input type="email" id="np-sender-email" /></label>
      <label>Address <input type="text" id="np-sender-address" required /></label>
      <label>City <input type="text" id="np-sender-city" required /></label>
      <label>Country <input type="text" id="np-sender-country" required /></label>
      <label>Postcode (optional) <input type="text" id="np-sender-postcode" /></label>

      <h2>Receiver information</h2>
      <label>Full name <input type="text" id="np-receiver-name" required /></label>
      <label>Phone number <input type="tel" id="np-receiver-phone" required /></label>
      <label>Email (optional) <input type="email" id="np-receiver-email" /></label>
      <label>Delivery address <input type="text" id="np-receiver-address" required /></label>
      <label>City <input type="text" id="np-receiver-city" required /></label>
      <label>Country <input type="text" id="np-receiver-country" required /></label>
      <label>Postcode <input type="text" id="np-receiver-postcode" required /></label>

      <h2>Parcel information</h2>
      <label>Description <input type="text" id="np-description" placeholder="e.g. Electronics, Documents, Clothes" required /></label>
      <label>Weight (kg) <input type="number" step="0.01" min="0" id="np-weight" required /></label>
      <div class="coord-row">
        <label>Length (cm) <input type="number" step="0.1" min="0" id="np-length" required /></label>
        <label>Width (cm) <input type="number" step="0.1" min="0" id="np-width" required /></label>
        <label>Height (cm) <input type="number" step="0.1" min="0" id="np-height" required /></label>
      </div>
      <label>Number of packages <input type="number" step="1" min="1" id="np-packages" value="1" required /></label>
      <label>Declared value (£, optional) <input type="number" step="0.01" min="0" id="np-value" /></label>
      <label class="checkbox-row"><input type="checkbox" id="np-fragile" /> Fragile</label>
      <label>Special handling instructions (optional) <input type="text" id="np-instructions" /></label>

      <h2>Shipping details</h2>
      <label>Service type
        <select id="np-service">
          <option value="standard">Standard</option>
          <option value="express">Express</option>
          <option value="overnight">Overnight</option>
        </select>
      </label>
      <label>Shipping date <input type="date" id="np-shipping-date" required /></label>
      <label>Expected delivery date (optional) <input type="date" id="np-eta" /></label>
      <label>Origin <input type="text" id="np-origin" placeholder="e.g. Leeds Depot" required /></label>
      <label>Destination <input type="text" id="np-destination" placeholder="e.g. Manchester, M1 1AE" required /></label>
      <label>Shipping cost (£, optional) <input type="number" step="0.01" min="0" id="np-cost" /></label>
      <label>Payment status
        <select id="np-payment-status">
          <option value="unpaid">Unpaid</option>
          <option value="paid">Paid</option>
        </select>
      </label>
      <label>Payment method
        <select id="np-payment-method">
          <option value="card">Card</option>
          <option value="cash">Cash</option>
          <option value="bank_transfer">Bank Transfer</option>
          <option value="other">Other</option>
        </select>
      </label>

      <p id="new-parcel-error" class="form-error hidden"></p>
      <button type="submit" class="btn-primary">Create parcel</button>
    </form>
  </section>

  <section id="view-detail" class="hidden">
    <div class="view-header">
      <h1 id="detail-title">Parcel</h1>
      <button class="btn-secondary back-btn" data-back="view-list">← Back to list</button>
    </div>

    <div class="status-row detail-summary">
      <span id="detail-status-board" class="status-board"></span>
      <div class="route">
        <span id="detail-origin"></span>
        <span class="route-arrow">→</span>
        <span id="detail-destination"></span>
      </div>
    </div>

    <details class="detail-full-info">
      <summary>Full shipment details</summary>
      <div id="detail-info-grid" class="info-grid"></div>
    </details>

    <h2>History</h2>
    <ul id="detail-timeline" class="timeline"></ul>

    <h2>Add tracking update</h2>
    <form id="add-event-form" class="card-form">
      <label>Status
        <select id="ev-status">
          <option value="created">Created</option>
          <option value="dispatched">Dispatched</option>
          <option value="in_transit">In Transit</option>
          <option value="out_for_delivery">Out For Delivery</option>
          <option value="delivered">Delivered</option>
          <option value="exception">Exception</option>
        </select>
      </label>
      <label>Location name
        <div class="geocode-row">
          <input type="text" id="ev-location" placeholder="e.g. Birmingham Distribution Centre" required />
          <button type="button" id="geocode-btn" class="btn-secondary">Find</button>
        </div>
      </label>
      <div id="pin-map" class="pin-map"></div>
      <div class="coord-row">
        <label>Latitude <input type="number" step="any" id="ev-lat" required /></label>
        <label>Longitude <input type="number" step="any" id="ev-lng" required /></label>
      </div>
      <label>Note (optional) <input type="text" id="ev-note" /></label>
      <p id="add-event-error" class="form-error hidden"></p>
      <button type="submit" class="btn-primary">Add update</button>
    </form>
  </section>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// Fill these in from your Supabase project:
// Project Settings → API → Project URL / anon public key.
// The anon key is safe to expose in client-side code — it only works
// within the limits of the Row Level Security policies in sql/schema.sql.
const SUPABASE_URL = 'https://rwnuvswppddbcbxgssnl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_lX1MVqampSaP-0Z6tJx3KA_39NYNlPr';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STATUS_META = {
  created: { label: 'Created', color: '#5B6470' },
  dispatched: { label: 'Dispatched', color: '#3F5B73' },
  in_transit: { label: 'In Transit', color: '#C98A2B' },
  out_for_delivery: { label: 'Out For Delivery', color: '#C15B2C' },
  delivered: { label: 'Delivered', color: '#2F7A4D' },
  exception: { label: 'Exception', color: '#B5452F' },
};

function statusLabel(status) {
  return (STATUS_META[status] && STATUS_META[status].label) || status;
}

function statusColor(status) {
  return (STATUS_META[status] && STATUS_META[status].color) || '#5B6470';
}

// Renders a status as a row of "split-flap" character tiles inside `el`
// and triggers the flip-in animation. Used for the one or two hero status
// displays on a page — not for compact rows in a table.
function renderStatusBoard(el, status) {
  const label = statusLabel(status).toUpperCase();
  el.innerHTML = '';
  [...label].forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'flap';
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    span.style.animationDelay = `${i * 25}ms`;
    el.appendChild(span);
  });
  requestAnimationFrame(() => {
    el.querySelectorAll('.flap').forEach((s) => s.classList.add('flip'));
  });
}

let currentParcel = null;
let pinMap = null;
let pinMarker = null;

function show(viewId) {
  ['view-list', 'view-new', 'view-detail'].forEach((id) => {
    document.getElementById(id).classList.toggle('hidden', id !== viewId);
  });
}

document.querySelectorAll('.back-btn').forEach((btn) => {
  btn.addEventListener('click', () => show(btn.dataset.back));
});

function fmtDate(d) {
  return d ? new Date(d).toLocaleString('en-GB') : '—';
}

// ---------- List ----------
async function loadParcelList() {
  const tbody = document.getElementById('parcel-table-body');
  const emptyEl = document.getElementById('list-empty');
  tbody.innerHTML = '';

  const { data, error } = await supabaseClient
    .from('parcels')
    .select('*')
    .order('updated_at', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  emptyEl.classList.toggle('hidden', data.length > 0);

  data.forEach((p) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${p.tracking_number}</td>
      <td>${p.receiver_name}</td>
      <td>${p.destination}</td>
      <td><span class="status-pill" style="background:${statusColor(p.status)}">${statusLabel(p.status)}</span></td>
      <td>${fmtDate(p.updated_at)}</td>
      <td><button class="btn-secondary view-btn" data-id="${p.id}">View</button></td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.view-btn').forEach((btn) => {
    btn.addEventListener('click', () => openDetail(btn.dataset.id));
  });
}

// ---------- New parcel ----------
document.getElementById('new-parcel-btn').addEventListener('click', () => {
  document.getElementById('new-parcel-form').reset();
  document.getElementById('new-parcel-error').classList.add('hidden');
  show('view-new');
});

function generateTrackingNumber() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no O/0/I/1, easy to misread
  let code = 'UK';
  for (let i = 0; i < 10; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

document.getElementById('new-parcel-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('new-parcel-error');
  errorEl.classList.add('hidden');

  const val = (id) => document.getElementById(id).value.trim();
  const numOrNull = (id) => {
    const v = document.getElementById(id).value;
    return v === '' ? null : parseFloat(v);
  };

  const payload = {
    sender_name: val('np-sender-name'),
    sender_phone: val('np-sender-phone'),
    sender_email: val('np-sender-email') || null,
    sender_address: val('np-sender-address'),
    sender_city: val('np-sender-city'),
    sender_country: val('np-sender-country'),
    sender_postcode: val('np-sender-postcode') || null,

    receiver_name: val('np-receiver-name'),
    receiver_phone: val('np-receiver-phone'),
    receiver_email: val('np-receiver-email') || null,
    receiver_address: val('np-receiver-address'),
    receiver_city: val('np-receiver-city'),
    receiver_country: val('np-receiver-country'),
    receiver_postcode: val('np-receiver-postcode'),

    parcel_description: val('np-description'),
    weight_kg: numOrNull('np-weight'),
    length_cm: numOrNull('np-length'),
    width_cm: numOrNull('np-width'),
    height_cm: numOrNull('np-height'),
    num_packages: parseInt(document.getElementById('np-packages').value, 10) || 1,
    declared_value: numOrNull('np-value'),
    fragile: document.getElementById('np-fragile').checked,
    special_instructions: val('np-instructions') || null,

    service_type: val('np-service'),
    shipping_date: document.getElementById('np-shipping-date').value || null,
    estimated_delivery: document.getElementById('np-eta').value || null,
    origin: val('np-origin'),
    destination: val('np-destination'),
    shipping_cost: numOrNull('np-cost'),
    payment_status: val('np-payment-status'),
    payment_method: val('np-payment-method'),
  };

  let attempts = 0;
  let created = null;
  let lastError = null;

  while (attempts < 5 && !created) {
    attempts++;
    const tracking_number = generateTrackingNumber();
    const { data, error } = await supabaseClient
      .from('parcels')
      .insert({ tracking_number, ...payload })
      .select()
      .single();

    if (!error) {
      created = data;
    } else if (error.code !== '23505') { // not a duplicate-tracking-number retry case
      lastError = error;
      break;
    }
  }

  if (!created) {
    errorEl.textContent = lastError ? lastError.message : 'Could not generate a unique tracking number — please try again.';
    errorEl.classList.remove('hidden');
    return;
  }

  await loadParcelList();
  openDetail(created.id);
});

// ---------- Detail ----------
async function openDetail(parcelId) {
  const { data: parcel, error } = await supabaseClient
    .from('parcels')
    .select('*')
    .eq('id', parcelId)
    .single();

  if (error || !parcel) {
    console.error(error);
    show('view-list');
    return;
  }

  currentParcel = parcel;
  document.getElementById('detail-title').textContent = `${parcel.tracking_number} — ${parcel.receiver_name}`;
  document.getElementById('detail-origin').textContent = parcel.origin;
  document.getElementById('detail-destination').textContent = parcel.destination;
  renderStatusBoard(document.getElementById('detail-status-board'), parcel.status);
  renderDetailInfo(parcel);

  await loadDetailTimeline(parcelId);

  document.getElementById('add-event-form').reset();
  document.getElementById('ev-status').value = parcel.status;
  document.getElementById('add-event-error').classList.add('hidden');

  show('view-detail');

  // Leaflet needs a visible container to size itself correctly, so
  // (re)initialise / invalidate on the next tick, after 'hidden' is removed.
  setTimeout(() => {
    if (!pinMap) {
      pinMap = L.map('pin-map').setView([54.5, -3.5], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 18,
      }).addTo(pinMap);
      pinMap.on('click', (e) => setPin(e.latlng.lat, e.latlng.lng));
    }
    if (pinMarker) {
      pinMap.removeLayer(pinMarker);
      pinMarker = null;
    }
    pinMap.invalidateSize();
  }, 0);
}

function renderDetailInfo(p) {
  const grid = document.getElementById('detail-info-grid');
  const row = (label, value) =>
    value === null || value === undefined || value === ''
      ? ''
      : `<div class="info-row"><span class="info-label">${label}</span><span class="info-value">${value}</span></div>`;
  const section = (title) => `<div class="info-section-title">${title}</div>`;
  const money = (v) => (v === null || v === undefined ? '' : `£${Number(v).toFixed(2)}`);
  const cap = (s) => (s ? s.charAt(0).toUpperCase() + s.slice(1).replace('_', ' ') : '');

  const senderAddress = [p.sender_address, p.sender_city, p.sender_country, p.sender_postcode].filter(Boolean).join(', ');
  const receiverAddress = [p.receiver_address, p.receiver_city, p.receiver_country, p.receiver_postcode].filter(Boolean).join(', ');
  const dimensions = (p.length_cm && p.width_cm && p.height_cm) ? `${p.length_cm} × ${p.width_cm} × ${p.height_cm} cm` : '';

  grid.innerHTML = `
    ${section('Sender')}
    ${row('Name', p.sender_name)}
    ${row('Phone', p.sender_phone)}
    ${row('Email', p.sender_email)}
    ${row('Address', senderAddress)}

    ${section('Receiver')}
    ${row('Name', p.receiver_name)}
    ${row('Phone', p.receiver_phone)}
    ${row('Email', p.receiver_email)}
    ${row('Address', receiverAddress)}

    ${section('Parcel')}
    ${row('Description', p.parcel_description)}
    ${row('Weight', p.weight_kg ? `${p.weight_kg} kg` : '')}
    ${row('Dimensions', dimensions)}
    ${row('Packages', p.num_packages)}
    ${row('Declared value', money(p.declared_value))}
    ${row('Fragile', p.fragile ? 'Yes' : 'No')}
    ${row('Special instructions', p.special_instructions)}

    ${section('Shipping')}
    ${row('Service', cap(p.service_type))}
    ${row('Shipping date', p.shipping_date ? new Date(p.shipping_date).toLocaleDateString('en-GB') : '')}
    ${row('Shipping cost', money(p.shipping_cost))}
    ${row('Payment status', cap(p.payment_status))}
    ${row('Payment method', cap(p.payment_method))}
  `;
}

async function loadDetailTimeline(parcelId) {
  const timelineEl = document.getElementById('detail-timeline');
  timelineEl.innerHTML = '';

  const { data: events, error } = await supabaseClient
    .from('tracking_events')
    .select('*')
    .eq('parcel_id', parcelId)
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  events.forEach((e) => {
    const li = document.createElement('li');
    li.className = 'timeline-item';
    li.innerHTML = `
      <span class="timeline-dot" style="background:${statusColor(e.status)}"></span>
      <div class="timeline-content">
        <div class="timeline-status">${statusLabel(e.status)}</div>
        <div class="timeline-location">${e.location_name}${e.note ? ' — ' + e.note : ''}</div>
        <div class="timeline-time">${fmtDate(e.created_at)}</div>
      </div>
    `;
    timelineEl.appendChild(li);
  });
}

function setPin(lat, lng) {
  document.getElementById('ev-lat').value = lat.toFixed(6);
  document.getElementById('ev-lng').value = lng.toFixed(6);
  if (pinMarker) {
    pinMarker.setLatLng([lat, lng]);
  } else {
    pinMarker = L.marker([lat, lng], { draggable: true }).addTo(pinMap);
    pinMarker.on('dragend', () => {
      const pos = pinMarker.getLatLng();
      document.getElementById('ev-lat').value = pos.lat.toFixed(6);
      document.getElementById('ev-lng').value = pos.lng.toFixed(6);
    });
  }
  pinMap.setView([lat, lng], 11);
}

document.getElementById('geocode-btn').addEventListener('click', async () => {
  const query = document.getElementById('ev-location').value.trim();
  if (!query) return;
  const errorEl = document.getElementById('add-event-error');
  errorEl.classList.add('hidden');

  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=gb&q=${encodeURIComponent(query)}`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'en-GB' } });
    const results = await res.json();
    if (!results.length) {
      errorEl.textContent = 'No matching UK location found — you can drop a pin on the map instead.';
      errorEl.classList.remove('hidden');
      return;
    }
    setPin(parseFloat(results[0].lat), parseFloat(results[0].lon));
  } catch (err) {
    console.error(err);
    errorEl.textContent = 'Location lookup failed — you can drop a pin on the map instead.';
    errorEl.classList.remove('hidden');
  }
});

document.getElementById('add-event-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('add-event-error');
  errorEl.classList.add('hidden');

  const status = document.getElementById('ev-status').value;
  const location_name = document.getElementById('ev-location').value.trim();
  const latitude = parseFloat(document.getElementById('ev-lat').value);
  const longitude = parseFloat(document.getElementById('ev-lng').value);
  const note = document.getElementById('ev-note').value.trim() || null;

  if (Number.isNaN(latitude) || Number.isNaN(longitude)) {
    errorEl.textContent = 'Set a location using "Find" or by clicking the map first.';
    errorEl.classList.remove('hidden');
    return;
  }

  const { data: { session } } = await supabaseClient.auth.getSession();

  const { error } = await supabaseClient.from('tracking_events').insert({
    parcel_id: currentParcel.id,
    status,
    location_name,
    latitude,
    longitude,
    note,
    created_by: session?.user?.id || null,
  });

  if (error) {
    errorEl.textContent = error.message;
    errorEl.classList.remove('hidden');
    return;
  }

  await openDetail(currentParcel.id);
  await loadParcelList();
});

// ---------- Init ----------
async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    window.location.href = 'staff-login.html';
    return;
  }
  document.getElementById('staff-email').textContent = session.user.email;

  document.getElementById('sign-out').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'staff-login.html';
  });

  await loadParcelList();
  show('view-list');
}

init();
</script>
